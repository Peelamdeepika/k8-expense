kind: Deployment
apiVersion: apps/v1
metadata:
  name: mysql
  namespace: expense
  # based on these replica labels deployment will create
  labels:
   app: mysql
   tier: mysql
   project: expense
spec:
  replicas: 1
  selector:
   matchLabels:
    app: mysql
    tier: mysql
    project: expense 
template:
  metadata:
    labels:
     app: mysql
    tier: mysql
    project: expense
  spec:
    containers:
      name: mysql
      image: joindevops/mysql:1.0.0      